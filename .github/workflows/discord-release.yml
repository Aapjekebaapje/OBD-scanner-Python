name: Send code changes to Discord

on:
  push:
    branches:
      - main
      - master

jobs:
  discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send push update to Discord
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "$(jq -n \
            --arg title "🧪 Beta update pushed" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg author "$AUTHOR" \
            --arg msg "$COMMIT_MSG" \
            --arg url "$COMMIT_URL" \
            '{
              username: "GitHub Beta Updates",
              embeds: [{
                title: $title,
                url: $url,
                description: "**Repository:** \($repo)\n**Branch:** \($branch)\n**Author:** \($author)\n\n**Change:**\n\($msg)",
                color: 16753920
              }]
            }')" \
          "${{ secrets.DISCORD_WEBHOOK }}"
